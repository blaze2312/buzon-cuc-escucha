<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buzón CUC Escucha</title>

<style>

body{
font-family: Arial;
background-color: lightblue;
text-align:center;
}

form{
background:white;
padding:20px;
width:320px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

input, textarea{
width:90%;
margin:6px;
padding:6px;
}

button{
background:#0077ff;
color:white;
border:none;
padding:10px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Buzón CUC Escucha</h1>

<p>Comparte tus sugerencias para mejorar la experiencia estudiantil.</p>

<form>

<input type="text" placeholder="Nombre completo">

<input type="email" placeholder="Correo institucional">

<input type="text" placeholder="Programa académico">

<input type="text" placeholder="Semestre">

<textarea placeholder="Escribe tu sugerencia"></textarea>

<button type="submit">Enviar sugerencia</button>

</form>

</body>
</html>
